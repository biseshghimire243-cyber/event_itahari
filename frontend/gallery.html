<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Hero Header -->
  <header class="hero">
    <h1>Our Gallery</h1>
    <p>Relive unforgettable moments from our events.</p>
  </header>

  <!-- Filter Buttons -->
  <div class="filters">
    <button class="active" data-filter="all">All</button>
    <button data-filter="wedding">Wedding</button>
    <button data-filter="seminar">Seminar</button>
    <button data-filter="birthday">Birthday</button>
    <button data-filter="corporate">Corporate</button>
  </div>

  <!-- Gallery Grid -->
  <section class="gallery" id="gallery">
    <div class="card wedding">
      <img src="https://picsum.photos/500/350?1" alt="Wedding Ceremony">
      <h3>Wedding Ceremony</h3>
      <p>Itahari • 20 Apr 2026</p>
    </div>
    <div class="card seminar">
      <img src="https://picsum.photos/500/350?2" alt="Leadership Seminar">
      <h3>Leadership Seminar</h3>
      <p>Itahari • 15 Mar 2026</p>
    </div>
    <div class="card birthday">
      <img src="https://picsum.photos/500/350?3" alt="Birthday Party">
      <h3>Birthday Party</h3>
      <p>Dharan • 10 Feb 2026</p>
    </div>
    <div class="card corporate">
      <img src="https://picsum.photos/500/350?4" alt="Corporate Gala">
      <h3>Corporate Gala</h3>
      <p>Biratnagar • 25 Jan 2026</p>
    </div>
  </section>

  <!-- Statistics Section -->
  <section class="stats">
    <div>
      <h2>50+</h2>
      <p>Events</p>
    </div>
    <div>
      <h2>10,000+</h2>
      <p>Participants</p>
    </div>
    <div>
      <h2>250+</h2>
      <p>Photos</p>
    </div>
    <div>
      <h2>35+</h2>
      <p>Videos</p>
    </div>
  </section>

  <script src="js/gallery.js"></script>
</body>
</html>
